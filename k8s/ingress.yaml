apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
  namespace: kantin
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000      # ← Harus 5000, sesuai service backend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80